<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
  }
  h1 {
    margin-bottom: 10px;
  }
  #status {
    margin-bottom: 20px;
    font-size: 1.2rem;
    font-weight: 600;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-template-rows: repeat(3, 100px);
    gap: 10px;
  }
  .cell {
    width: 100px;
    height: 100px;
    background: #1e293b;
    border: 2px solid #334155;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }
  .cell:hover {
    background: #334155;
  }
  .cell.x { color: #38bdf8; }
  .cell.o { color: #f472b6; }
  button {
    margin-top: 20px;
    padding: 10px 20px;

    color: #0
